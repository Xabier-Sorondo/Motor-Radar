<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MotorRadar</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  background: linear-gradient(90deg, red, black);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #111;
  border: 1px solid #333;
  padding: 15px;
  border-radius: 12px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
  border-color: red;
}

.live {
  color: red;
  font-weight: bold;
}

</style>
</head>

<body>

<header>
  <h1>🏁 MotorRadar</h1>
  <p>El centro del automovilismo en tiempo real</p>
</header>

<div class="grid">

  <div class="card">
    <h2>Fórmula 1</h2>
    <p>Próxima carrera: Monza</p>
    <p class="live">EN DIRECTO</p>
  </div>

  <div class="card">
    <h2>GT World Challenge</h2>
    <p>Próxima carrera: Spa</p>
  </div>

  <div class="card">
    <h2>WEC</h2>
    <p>Próxima carrera: Fuji</p>
  </div>

  <div class="card">
    <h2>📰 Noticias</h2>
    <ul id="news"></ul>
  </div>

</div>

<script>
// Ejemplo básico de noticias automáticas
fetch("https://newsapi.org/v2/everything?q=motorsport&apiKey=TU_API_KEY")
.then(res => res.json())
.then(data => {
  let newsList = document.getElementById("news");
  data.articles.slice(0,5).forEach(article => {
    let li = document.createElement("li");
    li.innerText = article.title;
    newsList.appendChild(li);
  });
});
</script>

</body>
</html>
